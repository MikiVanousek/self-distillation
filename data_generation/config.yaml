# Data Generation Configuration

model:
  name: "Qwen/Qwen3-4B-Instruct-2507"
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85

dataset:
  name: "microsoft/rStar-Coder"
  config: "seed_sft"
  split: "train"

output:
  path: "./output"
  hf_repo: "MikiV/Qwen3-4B-Instruct-rStar-Coder-Replies"

generation:
  temperature: 1.5
  top_k: 20
  top_p: 0.8
  repetition_penalty: 1.0
  max_tokens: 65536

post_process:
  filter_shortest_percent: 10     # Drop bottom 10% shortest responses
